packages:
  - apps/*
  - packages/*
catalog:
  dotenv: ^17.3.1
  typescript: ^5.9.3
  convex: ^1.33.1
  better-auth: 1.4.9
  "@convex-dev/better-auth": ^0.11.2
  "@types/node": ^25.5.0
  "effect": "^3.19.19"
  "@effect/language-service": "^0.80.0"
  zod: ^4.3.6
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vite-plus: latest
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
