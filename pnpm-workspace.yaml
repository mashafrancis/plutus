packages:
  - apps/*
  - packages/*
allowBuilds:
  '@sentry/cli': true
catalog:
  "@convex-dev/better-auth": ^0.11.2
  "@effect/language-service": "^0.80.0"
  "@types/node": ^25.5.0
  better-auth: 1.4.9
  convex: ^1.33.1
  dotenv: ^17.3.1
  "effect": "^3.19.19"
  typescript: ^5.9.3
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: ^0.1.12
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  zod: ^4.3.6
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
